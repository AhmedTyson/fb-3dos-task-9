<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>forgetpass</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="./css/forgotpass.css">
</head>

<body>
    <div class="forgetpass">
        <div class="icon">
            <!-- <i class="fa-solid fa-user"></i> -->
            <a href="#" class="home-link">
                <i class="fa-solid fa-house"></i>
                <span class="hover-text">Back to Home</span>
            </a>
            <button id="theme-toggle" class="theme-btn"><i class="fa-solid fa-moon"></i></button>
        </div>
        <h1>Forgot Password?</h1>
        <p>Enter the email associated with your account and we'll send a link to reset your password.</p>

        <form>
            <div class="input">

                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="rana25@gmail.com" required>
                <p id="emailMsg" class="error-msg d-none">Please enter a valid email address.</p>
                <!-- ahmed.elsayed.net27@gmail.com -->

            </div>
            <button type="submit" class="submitBtn" id="forget">Send Reset Link</button>
            <a href="login.html" class="back-login"><i class="fa-solid fa-arrow-left"></i> Back to Login</a>
        </form>
    </div>
    <script src="./js/config.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/forgotpass.js"></script>
    <script src="./js/theme.js"></script>
</body>

</html>
