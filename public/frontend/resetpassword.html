<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>resetpass</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="./css/resetpass.css">
</head>

<body>
    <div class="resetpass">
        <div class="icon">
            <!-- <i class="fa-solid fa-user"></i> -->
            <a href="#" class="home-link">
                <i class="fa-solid fa-house"></i>
                <span class="hover-text">Back to Home</span>
            </a>
            <button id="theme-toggle" class="theme-btn"><i class="fa-solid fa-moon"></i></button>
        </div>
        <h1>Create New Password</h2>
            <p class="subtitle">Secure your account with a strong password.</p>

            <form>
                <div class="input">

                    <label for="password">New Password</label>
                    <input type="password" id="password" placeholder="Min. 8 characters" required>
                    <p id="passwordMsg" class="error-msg d-none">Password does not meet the requirements.</p>

                    <ul class="requirements-list">
                        <li id="req-length">At least 8 characters</li>
                        <li id="req-upper">1 uppercase letter</li>
                        <li id="req-lower">1 lowercase letter</li>
                        <li id="req-number">1 number</li>
                        <li id="req-special">1 special character</li>
                    </ul>

                    <label for="confpass">Confirm New Password</label>
                    <input type="password" id="confpass" placeholder="Repeat your new password" required>
                    <p id="confpassMsg" class="error-msg d-none">Passwords do not match.</p>
                </div>
                <button type="submit" class="submitBtn" id="resetBtn">Update Password <i
                        class="fa-solid fa-arrow-right"></i></button>
                <a href="login.html" class="back-login"><i class="fa-solid fa-arrow-left"></i> Back to Login</a>
            </form>
    </div>
    <script src="./js/config.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/resetpass.js"></script>
    <script src="./js/theme.js"></script>
</body>

</html>
