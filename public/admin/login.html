<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CommerceAdmin - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #f8f9fa;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .login-card {
        background: #fff;
        border: 1px solid #e9ecef;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
        width: 100%;
        max-width: 440px;
        padding: 40px 35px;
      }
      .brand-title {
        font-size: 24px;
        font-weight: 700;
        color: #0d6efd;
        text-align: center;
        margin-bottom: 5px;
      }
      .brand-subtitle {
        font-size: 13px;
        color: #6c757d;
        text-align: center;
        margin-bottom: 35px;
      }
      .form-label {
        font-size: 13px;
        font-weight: 600;
        color: #495057;
      }
      .input-group-text {
        background-color: #f8f9fa;
        border-right: none;
        color: #6c757d;
      }
      .form-control {
        border-left: none;
        height: 46px;
        font-size: 14px;
      }
      .form-control:focus {
        box-shadow: none;
        border-color: #ced4da;
      }
      .input-group:focus-within .input-group-text,
      .input-group:focus-within .form-control {
        border-color: #0d6efd;
        background-color: #fff;
      }
      .btn-login {
        height: 46px;
        font-weight: 600;
        font-size: 15px;
        background-color: #0d6efd;
        border: none;
        transition: all 0.2s ease;
      }
      .btn-login:hover {
        background-color: #0b5ed7;
      }
      .password-toggle {
        cursor: pointer;
        border-left: none;
        background-color: #f8f9fa;
      }
      .input-group:focus-within .password-toggle {
        background-color: #fff;
      }
      .form-check-label {
        font-size: 13px;
        color: #495057;
      }
      .forgot-link {
        font-size: 13px;
        color: #0d6efd;
        text-decoration: none;
        font-weight: 500;
      }
      .forgot-link:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="login-card mx-3">
      <div class="brand-title">CommerceAdmin</div>
      <div class="brand-subtitle">Operations Hub Portal</div>

      <form id="loginForm">
        <div class="mb-3">
          <label for="email" class="form-label">Email Address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fa-regular fa-envelope"></i></span>
            <input type="email" id="email" class="form-control" placeholder="admin@enterprise.com" required style="border-top-right-radius: 8px; border-bottom-right-radius: 8px" />
          </div>
        </div>

        <div class="mb-3">
          <div class="d-flex justify-content-between align-items-center mb-1">
            <label for="password" class="form-label mb-0">Password</label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>
          <div class="input-group">
            <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required style="border-right: none" />
            <span class="input-group-text password-toggle" id="togglePassword" style="border-top-right-radius: 8px; border-bottom-right-radius: 8px">
              <i class="fa-regular fa-eye"></i>
            </span>
          </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4 mt-3">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="rememberMe" />
            <label class="form-check-input-label form-check-label" for="rememberMe"> Keep me signed in </label>
          </div>
        </div>

          <div id="errorBanner" class="alert alert-danger d-none" role="alert"></div>

          <button type="submit" id="loginBtn" class="btn btn-primary w-100 btn-login rounded-3 mb-3">Sign In to Admin Hub</button>
        </form>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

      <script>
        document.addEventListener("DOMContentLoaded", function () {
          const passwordInput = document.getElementById("password");
          const togglePassword = document.getElementById("togglePassword");
          const loginForm = document.getElementById("loginForm");
          const errorBanner = document.getElementById("errorBanner");
          const loginBtn = document.getElementById("loginBtn");

          const API_BASE = window.location.origin + "/api";

          togglePassword.addEventListener("click", function () {
            const type = passwordInput.getAttribute("type") === "password" ? "text" : "password";
            passwordInput.setAttribute("type", type);
            const icon = this.querySelector("i");
            icon.classList.toggle("fa-eye");
            icon.classList.toggle("fa-eye-slash");
          });

          loginForm.addEventListener("submit", async function (e) {
            e.preventDefault();
            const email = document.getElementById("email").value;
            const password = passwordInput.value;

            errorBanner.classList.add("d-none");
            loginBtn.disabled = true;
            loginBtn.innerText = "Signing In...";

            try {
                const response = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json',
                        'ngrok-skip-browser-warning': 'true'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Invalid Credentials or Access Denied');
                }

                // Store JWT token
                localStorage.setItem("admin_token", data.data.token);
                localStorage.setItem("admin_email", email);

                window.location.href = "index.html"; // Redirect to dashboard
            } catch (err) {
                errorBanner.innerText = err.message;
                errorBanner.classList.remove("d-none");
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerText = "Sign In to Admin Hub";
            }
          });
        });
      </script>
    </body>
</html>
